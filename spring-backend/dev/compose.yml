name: piudaa-dev
services:
  cache:
    image: redis:7.4.1-alpine3.20
    container_name: piudaa_cache
    ports:
      - "6379:6379"
    volumes:
      - cache-data:/data

  rdb:
    image: postgres:17.2-alpine3.21
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - rdb-data:/var/lib/postgresql

volumes:
  cache-data:
  rdb-data: